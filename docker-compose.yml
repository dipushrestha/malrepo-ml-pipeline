version: "3.8"

services:
  trainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./configs:/app/configs
      - ./mlruns:/app/mlruns
    environment:
      - WANDB_API_KEY=${WANDB_API_KEY}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - mlflow
    command: python scripts/train.py --config configs/resnet50.yaml

  serving:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./models:/app/models:ro
    environment:
      - MODEL_PATH=/app/models/saved/best.pt
    command: uvicorn src.deployment.server:app --host 0.0.0.0 --port 8080

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlruns/mlruns.db
      --default-artifact-root /mlruns/artifacts
      --host 0.0.0.0
      --port 5000
