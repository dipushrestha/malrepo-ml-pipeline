serving:
  port: 8080
  workers: 4
  timeout: 30
  max_batch_size: 32
  model_path: models/saved/best.pt
  model_format: pytorch  # pytorch | onnx

monitoring:
  enabled: true
  window_size: 1000
  drift_threshold: 0.1
  metrics_port: 9090

kubernetes:
  replicas: 2
  cpu_request: "500m"
  cpu_limit: "2000m"
  memory_request: "1Gi"
  memory_limit: "4Gi"
  gpu_limit: 1
