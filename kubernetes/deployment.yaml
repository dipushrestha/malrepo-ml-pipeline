apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-serving
  labels:
    app: mlops-serving
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mlops-serving
  template:
    metadata:
      labels:
        app: mlops-serving
    spec:
      containers:
        - name: serving
          image: ghcr.io/mlops-platform/serving:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
              nvidia.com/gpu: 1
            limits:
              cpu: "2000m"
              memory: "4Gi"
              nvidia.com/gpu: 1
          env:
            - name: MODEL_PATH
              value: /app/models/saved/best.pt
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: model-storage
              mountPath: /app/models
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-pvc
