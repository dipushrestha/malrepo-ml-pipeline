data:
  raw_dir: data/raw
  processed_dir: data/processed
  image_size: 224
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  num_workers: 4
  pin_memory: true

model:
  architecture: resnet50
  pretrained: true
  num_classes: 1000
  dropout: 0.2

training:
  epochs: 100
  batch_size: 64
  learning_rate: 0.001
  optimizer: adamw
  weight_decay: 0.01
  scheduler: cosine
  warmup_epochs: 5
  mixed_precision: true
  gradient_clip: 1.0
  early_stopping_patience: 10

evaluation:
  batch_size: 128
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score
    - auc_roc

mlflow:
  experiment_name: mlops-platform
  tracking_uri: http://localhost:5000
  log_artifacts: true

deployment:
  model_format: onnx
  serve_port: 8080
  max_batch_size: 32
  timeout_seconds: 30
